name: Process AI News Emails

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: read

jobs:
  process-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          IMAP_HOST=${{ secrets.IMAP_HOST }}
          IMAP_PORT=${{ secrets.IMAP_PORT }}
          IMAP_USERNAME=${{ secrets.IMAP_USERNAME }}
          IMAP_PASSWORD=${{ secrets.IMAP_PASSWORD }}
          EMAIL_SENDER_FILTER=${{ secrets.EMAIL_SENDER_FILTER }}
          EMAIL_FOLDER=${{ secrets.EMAIL_FOLDER }}
          LOOKBACK_HOURS=${{ secrets.LOOKBACK_HOURS }}
          POLL_INTERVAL_MINUTES=${{ secrets.POLL_INTERVAL_MINUTES }}
          SUMMARY_PROVIDER=${{ secrets.SUMMARY_PROVIDER }}
          PROCESS_ALL_MATCHING=${{ secrets.PROCESS_ALL_MATCHING }}
          MAX_EMAILS_PER_RUN=${{ secrets.MAX_EMAILS_PER_RUN }}
          CREATE_INSTAGRAM_POSTS=${{ secrets.CREATE_INSTAGRAM_POSTS }}
          ENRICH_ARTICLES=${{ secrets.ENRICH_ARTICLES }}
          AUTO_PUBLISH_INSTAGRAM=${{ secrets.AUTO_PUBLISH_INSTAGRAM }}
          IG_USER_ID=${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
          OLLAMA_URL=${{ secrets.OLLAMA_URL }}
          OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}
          PUBLIC_MEDIA_BASE_URL=${{ secrets.PUBLIC_MEDIA_BASE_URL }}
          EOF
      
      - name: Run email processing
        run: python -m email_summary_agent --once --all
      
      - name: Create logs directory if missing
        if: always()
        run: mkdir -p logs
      
      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-reports
          path: reports/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processing-logs
          path: logs/
          retention-days: 3
          if-no-files-found: warn
      
      - name: Commit and push generated reports
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add files if they exist
          [ -f reports/latest.md ] && git add reports/latest.md
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          [ -f data/agent.sqlite3 ] && git add data/agent.sqlite3
          
          # Check if there are staged changes and commit/push if so
          if ! git diff --staged --quiet; then
            git commit -m "chore: update news reports and Instagram assets [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
