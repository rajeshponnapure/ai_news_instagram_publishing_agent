name: CI - Code Quality & Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 black isort pytest
      
      - name: Check Python syntax
        run: |
          python -m py_compile email_summary_agent/*.py
      
      - name: Run flake8 linting
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 email_summary_agent --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 email_summary_agent --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      
      - name: Check code formatting with black
        run: |
          black email_summary_agent --check --diff --line-length=100 || true
      
      - name: Check import sorting with isort
        run: |
          isort email_summary_agent --check-only --diff || true
      
      - name: Test sample mode
        run: |
          python -m email_summary_agent --sample
      
      - name: Verify output
        run: |
          test -f reports/latest.md && echo "✓ Sample report generated successfully" || echo "✗ Sample report not found"
