name: Instagram Auto Publish

on:
  schedule:
    # Runs every 15 minutes. Always polls for new emails only.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Manual trigger - only for maintenance/recovery operations.
    # Automatic runs never use this path.
    inputs:
      run_mode:
        description: 'Maintenance mode - what to process'
        required: false
        default: 'backfill_24h'
        type: choice
        options:
          - 'backfill_24h'
          - 'rebuild_all'

concurrency:
  group: instagram-auto-publish
  cancel-in-progress: false
  # Only one run at a time. If a new trigger fires while a run is in progress,
  # it waits rather than running in parallel - this prevents duplicate posts.

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      has_batch: ${{ steps.detect.outputs.has_batch }}

    env:
      IMAP_HOST: imap.gmail.com
      IMAP_PORT: '993'
      IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
      IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
      EMAIL_SENDER_FILTER: ${{ secrets.EMAIL_SENDER_FILTER || 'grdevelopers.co@gmail.com' }}
      EMAIL_FOLDER: INBOX
      SUMMARY_PROVIDER: local
      PROCESS_ALL_MATCHING: 'false'
      LOOKBACK_HOURS: '48'
      EMAIL_CHECK_INTERVAL_MINUTES: '50'
      MAX_EMAILS_PER_RUN: '5'
      MAX_ARTICLE_LINKS_PER_EMAIL: '20'
      ENRICH_ARTICLES: 'true'
      CREATE_INSTAGRAM_POSTS: 'true'
      AUTO_PUBLISH_INSTAGRAM: 'false'
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Log trigger
        run: |
          echo "Workflow event: ${{ github.event_name }}"
          echo "Email check interval: ${EMAIL_CHECK_INTERVAL_MINUTES} minutes"

      - name: Process AI news email
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_mode }}" = "rebuild_all" ]; then
            python -m email_summary_agent --once --all --reprocess
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_mode }}" = "backfill_24h" ]; then
            python -m email_summary_agent --recent-all
          else
            # Automatic schedule run - only check for new emails
            python -m email_summary_agent --poll-once
          fi

      - name: Commit generated reports and state
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          [ -f data/agent.sqlite3 ] && git add data/agent.sqlite3
          [ -f reports/latest.md ] && git add reports/latest.md
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes."
          else
            git commit -m 'Update AI news Instagram assets [skip ci]'
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect unpublished batches
        id: detect
        run: |
          if [ ! -d reports/instagram_posts ]; then
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
            echo "No instagram_posts batch directory found. Nothing to publish."
            exit 0
          fi

          UNPUBLISHED=$(python3 <<'PY'
          import json
          from pathlib import Path

          root = Path("reports/instagram_posts")
          terminal = {"published", "publish_failed"}
          pending = 0

          for batch in sorted([p for p in root.iterdir() if p.is_dir()]):
              carousels = [p for p in batch.iterdir() if p.is_dir()]
              if not carousels:
                  continue
              manifest = batch / "publish_manifest.json"
              if not manifest.exists():
                  pending += len(carousels)
                  continue
              try:
                  data = json.loads(manifest.read_text(encoding="utf-8"))
              except Exception:
                  pending += len(carousels)
                  continue
              pending += sum(
                  1 for post in data.get("posts", [])
                  if post.get("status") not in terminal
              )

          print(pending)
          PY
          )

          if [ "$UNPUBLISHED" -gt 0 ]; then
            echo "has_batch=true" >> "$GITHUB_OUTPUT"
            echo "Found $UNPUBLISHED unpublished carousel(s). Deploy and publish will run."
          else
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
            echo "All carousels are already published or failed. Skipping deploy and publish."
          fi
      - name: Explain skipped publish
        if: steps.detect.outputs.has_batch != 'true'
        run: |
          echo "Deploy and publish are skipped - either no new email arrived this run,"
          echo "or all existing carousels are already published/failed."
          echo "This is normal and expected on most runs."

      - name: Upload GitHub Pages artifact
        if: steps.detect.outputs.has_batch == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy-pages:
    needs: generate
    if: needs.generate.outputs.has_batch == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    needs: deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      AUTO_PUBLISH_INSTAGRAM: 'true'
      AUTO_PUBLISH_FACEBOOK: 'true'
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      IG_API_VERSION: v24.0
      PUBLIC_MEDIA_BASE_URL: ${{ needs.deploy-pages.outputs.page_url }}instagram_posts
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull generated commit
        run: git pull --ff-only

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Publish latest carousel to Instagram
        run: python scripts/publish_latest_instagram.py

      - name: Commit publish manifest status
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "No publish status changes."
          else
            git commit -m 'Update Instagram publish status [skip ci]'
            git push
          fi
