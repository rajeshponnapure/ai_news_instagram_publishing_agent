name: Instagram Auto Publish

on:
  schedule:
    # Primary cron trigger — acts as a watchdog/recovery in case the
    # self-chain below misses a beat. GitHub may delay this by up to
    # 30 min but it ensures the workflow never stays dormant for long.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Choose whether to backfill recent mail or only check for new mail'
        required: false
        default: 'backfill_24h'
        type: choice
        options:
          - 'backfill_24h'
          - 'poll_new'
          - 'rebuild_all'
      _chained:
        description: 'Internal — set to true when triggered by self-chain'
        required: false
        default: 'false'
        type: string

concurrency:
  group: instagram-auto-publish
  cancel-in-progress: false
  # Only one run at a time. If a new trigger fires while a run is in progress,
  # it waits rather than running in parallel — this prevents duplicate posts.

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      has_batch: ${{ steps.detect.outputs.has_batch }}

    env:
      IMAP_HOST: imap.gmail.com
      IMAP_PORT: '993'
      IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
      IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
      EMAIL_SENDER_FILTER: ${{ secrets.EMAIL_SENDER_FILTER || 'grdevelopers.co@gmail.com' }}
      EMAIL_FOLDER: INBOX
      SUMMARY_PROVIDER: local
      PROCESS_ALL_MATCHING: 'false'
      LOOKBACK_HOURS: '48'
      MAX_EMAILS_PER_RUN: '5'
      MAX_ARTICLE_LINKS_PER_EMAIL: '20'
      ENRICH_ARTICLES: 'true'
      CREATE_INSTAGRAM_POSTS: 'true'
      AUTO_PUBLISH_INSTAGRAM: 'false'
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Process AI news email
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_mode }}" = "rebuild_all" ]; then
            python -m email_summary_agent --once --all --reprocess
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_mode }}" = "backfill_24h" ]; then
            python -m email_summary_agent --recent-all
          else
            python -m email_summary_agent --poll-once
          fi

      - name: Commit generated reports and state
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          [ -f data/agent.sqlite3 ] && git add data/agent.sqlite3
          [ -f reports/latest.md ] && git add reports/latest.md
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes."
          else
            git commit -m 'Update AI news Instagram assets [skip ci]'
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect latest unpublished batch
        id: detect
        run: |
          # Find the latest batch directory
          BATCH_DIR=$(find reports/instagram_posts -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort | tail -1)
          if [ -z "$BATCH_DIR" ]; then
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
            echo "No instagram_posts batch directory found. Nothing to publish."
            exit 0
          fi

          # Check the publish manifest for any posts that are NOT yet published
          MANIFEST="$BATCH_DIR/publish_manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            # No manifest yet — batch exists but hasn't been through publish step
            if find "$BATCH_DIR" -mindepth 2 -maxdepth 2 -type d 2>/dev/null | grep -q .; then
              echo "has_batch=true" >> "$GITHUB_OUTPUT"
              echo "Batch found with no manifest — will deploy and publish."
            else
              echo "has_batch=false" >> "$GITHUB_OUTPUT"
              echo "Batch directory exists but contains no carousel folders."
            fi
            exit 0
          fi

          # Parse the manifest: count posts that still need publishing
          UNPUBLISHED=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('$MANIFEST'))
              pending = [
                  p for p in data.get('posts', [])
                  if p.get('status') not in ('published', 'publish_failed')
              ]
              print(len(pending))
          except Exception as e:
              print(0)
          ")

          if [ "$UNPUBLISHED" -gt 0 ]; then
            echo "has_batch=true" >> "$GITHUB_OUTPUT"
            echo "Found $UNPUBLISHED unpublished carousel(s) in $BATCH_DIR. Deploy and publish will run."
          else
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
            echo "All carousels in $BATCH_DIR are already published or failed. Skipping deploy and publish."
          fi

      - name: Explain skipped publish
        if: steps.detect.outputs.has_batch != 'true'
        run: |
          echo "Deploy and publish are skipped — either no new email arrived this run,"
          echo "or all existing carousels are already published/failed."
          echo "This is normal and expected on most runs."

      - name: Upload GitHub Pages artifact
        if: steps.detect.outputs.has_batch == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy-pages:
    needs: generate
    if: needs.generate.outputs.has_batch == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    needs: deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      AUTO_PUBLISH_INSTAGRAM: 'true'
      AUTO_PUBLISH_FACEBOOK: 'true'
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      IG_API_VERSION: v24.0
      PUBLIC_MEDIA_BASE_URL: ${{ needs.deploy-pages.outputs.page_url }}instagram_posts
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull generated commit
        run: git pull --ff-only

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Publish latest carousel to Instagram
        run: python scripts/publish_latest_instagram.py

      - name: Commit publish manifest status
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "No publish status changes."
          else
            git commit -m 'Update Instagram publish status [skip ci]'
            git push
          fi

  # ─── Self-chain ────────────────────────────────────────────────────────────
  # Triggers the next run exactly 15 minutes after this one finishes.
  # This guarantees near-real-time polling even when GitHub's cron scheduler
  # is delayed or throttled. The cron above acts as a watchdog/recovery only.
  # Depends only on `generate` so it always runs — even when no new email
  # was found and the publish/deploy jobs were skipped.
  self-chain:
    needs: [generate]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait 15 minutes then re-trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          echo "Sleeping 15 minutes before triggering next run..."
          sleep 900
          gh workflow run instagram-auto-publish.yml \
            --repo "$REPO" \
            --ref "$REF" \
            --field run_mode=poll_new \
            --field _chained=true
          echo "Next run triggered successfully."
