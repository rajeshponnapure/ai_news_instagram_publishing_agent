name: Instagram Auto Publish

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: instagram-auto-publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
      IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
      EMAIL_SENDER_FILTER: grdevelopers.co@gmail.com
      SUMMARY_PROVIDER: local
      PROCESS_ALL_MATCHING: 'false'
      LOOKBACK_HOURS: '24'
      MAX_EMAILS_PER_RUN: '20'
      ENRICH_ARTICLES: 'true'
      CREATE_INSTAGRAM_POSTS: 'true'
      AUTO_PUBLISH_INSTAGRAM: 'true'
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IG_API_VERSION: v24.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependency
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }

      - name: Install cloudflared
        shell: powershell
        run: |
          Invoke-WebRequest -Uri 'https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe' -OutFile 'cloudflared.exe'
          "$(Get-Location)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run one publish pass
        shell: powershell
        run: |
          & .\scripts\run_free_auto_publish.ps1 -PollOnce

      - name: Commit updated state
        shell: powershell
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if (Test-Path 'data/agent.sqlite3') { git add data/agent.sqlite3 }
          if (Test-Path 'reports/latest.md') { git add reports/latest.md }
          if (Test-Path 'reports/instagram_posts') { git add -f reports/instagram_posts/ }
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m 'Update Instagram publish state [skip ci]'
            git push
          }
