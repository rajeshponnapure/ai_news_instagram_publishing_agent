name: Instagram Auto Publish

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild posts from all matching sender emails once'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: instagram-auto-publish
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      has_batch: ${{ steps.detect.outputs.has_batch }}

    env:
      IMAP_HOST: imap.gmail.com
      IMAP_PORT: '993'
      IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
      IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
      EMAIL_SENDER_FILTER: ${{ secrets.EMAIL_SENDER_FILTER || 'grdevelopers.co@gmail.com' }}
      EMAIL_FOLDER: INBOX
      SUMMARY_PROVIDER: local
      PROCESS_ALL_MATCHING: 'false'
      LOOKBACK_HOURS: '48'
      MAX_EMAILS_PER_RUN: '5'
      MAX_ARTICLE_LINKS_PER_EMAIL: '20'
      ENRICH_ARTICLES: 'true'
      CREATE_INSTAGRAM_POSTS: 'true'
      AUTO_PUBLISH_INSTAGRAM: 'false'
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Process AI news email
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.rebuild_all }}" = "true" ]; then
            python -m email_summary_agent --once --all --reprocess
          else
            python -m email_summary_agent --poll-once
          fi

      - name: Commit generated reports and state
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          [ -f data/agent.sqlite3 ] && git add data/agent.sqlite3
          [ -f reports/latest.md ] && git add reports/latest.md
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes."
          else
            git commit -m 'Update AI news Instagram assets [skip ci]'
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect latest unpublished batch
        id: detect
        run: |
          if find reports/instagram_posts -mindepth 2 -maxdepth 2 -type d 2>/dev/null | grep -q .; then
            echo "has_batch=true" >> "$GITHUB_OUTPUT"
            echo "Publishable carousel batch found. Deploy and publish jobs will run."
          else
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
            echo "No publishable carousel batch found."
            echo "This is expected when no new sender email arrived, or immediately after a reset when --poll-once seeds the mailbox watermark."
            echo "To rebuild old mailbox items, run this workflow manually with rebuild_all=true."
          fi

      - name: Explain skipped publish
        if: steps.detect.outputs.has_batch != 'true'
        run: |
          echo "Deploy and publish are skipped because generate produced no reports/instagram_posts batch."
          echo "Nothing failed; there is simply nothing new to upload or publish."

      - name: Upload GitHub Pages artifact
        if: steps.detect.outputs.has_batch == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy-pages:
    needs: generate
    if: needs.generate.outputs.has_batch == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    needs: deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AUTO_PUBLISH_INSTAGRAM: 'true'
      AUTO_PUBLISH_FACEBOOK: ${{ secrets.FB_PAGE_ID != '' }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN || secrets.IG_ACCESS_TOKEN }}
      IG_API_VERSION: v24.0
      PUBLIC_MEDIA_BASE_URL: ${{ needs.deploy-pages.outputs.page_url }}instagram_posts
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull generated commit
        run: git pull --ff-only

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Publish latest carousel to Instagram
        run: python scripts/publish_latest_instagram.py

      - name: Commit publish manifest status
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "No publish status changes."
          else
            git commit -m 'Update Instagram publish status [skip ci]'
            git push
          fi
