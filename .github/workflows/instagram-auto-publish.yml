name: Instagram Auto Publish

# ─────────────────────────────────────────────────────────────────────────────
# Architecture
# ─────────────────────────────────────────────────────────────────────────────
#
#  generate  ──►  deploy-pages  ──►  publish
#
#  generate     Polls Gmail every 15 minutes for new AI-news emails, summarises
#               them, renders carousel slides as PNGs, commits to the repo.
#               AUTO_PUBLISH_INSTAGRAM is OFF — images must be on GitHub Pages
#               before Instagram can download them.
#
#  deploy-pages Deploys the reports/ folder to GitHub Pages so all slide PNGs
#               are reachable at a public HTTPS URL.
#
#  publish      Reads the manifest, calls Instagram Graph API with the GitHub
#               Pages URLs, and commits the publish status back.
#
# The repo MUST be public and GitHub Pages must be enabled (Settings → Pages
# → Source: GitHub Actions).
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Runs every 30 minutes. The full workflow (generate + deploy + publish)
    # can take 15–25 minutes, so 15-minute cron was causing new runs to
    # cancel the publish step mid-flight.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Manual trigger - only for maintenance/recovery operations.
    inputs:
      run_mode:
        description: 'Maintenance mode - what to process'
        required: false
        default: 'backfill_24h'
        type: choice
        options:
          - 'backfill_24h'
          - 'rebuild_all'
  workflow_run:
    # Also run after CI completes on main — catches cron delays by piggybacking
    # on push-triggered CI runs.
    workflows: [CI]
    types:
      - completed

concurrency:
  group: instagram-auto-publish
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. GENERATE ──────────────────────────────────────────────────────────────
  generate:
    name: Generate carousel slides
    runs-on: ubuntu-latest
    # With unlimited articles (MAX_ARTICLE_LINKS_PER_EMAIL=0) a single digest
    # can carry 50–80+ articles. Each requires Playwright enrichment (~8–15s) +
    # summarization + dedup + image processing + rendering. 60 min gives headroom
    # for the largest digests while staying within the 30-min cron interval.
    timeout-minutes: 60
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      has_batch: ${{ steps.detect.outputs.has_batch }}

    env:
      IMAP_HOST: imap.gmail.com
      IMAP_PORT: '993'
      IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
      IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
      EMAIL_SENDER_FILTER: ${{ secrets.EMAIL_SENDER_FILTER || 'grdevelopers.co@gmail.com' }}
      EMAIL_FOLDER: INBOX
      SUMMARY_PROVIDER: local
      PROCESS_ALL_MATCHING: 'false'
      LOOKBACK_HOURS: '48'
      EMAIL_CHECK_INTERVAL_MINUTES: '25'
      MAX_EMAILS_PER_RUN: '3'
      MAX_ARTICLE_LINKS_PER_EMAIL: '0'
      ENRICH_ARTICLES: 'true'
      CREATE_INSTAGRAM_POSTS: 'true'
      AUTO_PUBLISH_INSTAGRAM: 'false'
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium (for article image scraping)
        run: python -m playwright install chromium

      - name: Log trigger
        run: |
          echo "Workflow event: ${{ github.event_name }}"
          echo "Email check interval: ${EMAIL_CHECK_INTERVAL_MINUTES} minutes"

      - name: Process AI news emails
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_mode }}" = "rebuild_all" ]; then
            python -m email_summary_agent --once --all --reprocess
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_mode }}" = "backfill_24h" ]; then
            python -m email_summary_agent --recent-all
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Triggered by CI completion after a push — run once immediately,
            # bypassing the poll interval gate so new code is exercised right away.
            python -m email_summary_agent --once
          else
            # Automatic schedule run - only check for new emails
            python -m email_summary_agent --poll-once
          fi

      - name: Rebuild safe backlog assets
        if: github.event_name == 'workflow_dispatch'
        run: python scripts/rebuild_instagram_backlog.py --since-hours 36

      - name: Set git remote with token
        if: always()
        run: git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Commit generated reports and state
        if: always()
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          [ -f data/agent.sqlite3 ] && git add data/agent.sqlite3
          [ -f reports/latest.md ] && git add reports/latest.md
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes."
          else
            git commit -m 'Update AI news Instagram assets [skip ci]'
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect unpublished batches
        if: always()
        id: detect
        run: |
          if [ ! -d reports/instagram_posts ]; then
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
            echo "No instagram_posts batch directory found. Nothing to publish."
            exit 0
          fi

          UNPUBLISHED=$(python3 <<'PY'
          import json, re
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          root = Path("reports/instagram_posts")
          # Only consider batches generated within last 24 hours (same guard as publish script)
          MAX_AGE_DAYS = 1
          terminal = {"published", "publish_failed"}
          pending = 0
          now = datetime.now(timezone.utc)

          def batch_is_recent(batch_dir):
              try:
                  dt = datetime.strptime(batch_dir.name[:15], "%Y%m%d-%H%M%S").replace(tzinfo=timezone.utc)
                  return (now - dt) <= timedelta(days=MAX_AGE_DAYS)
              except ValueError:
                  pass
              try:
                  return (now.timestamp() - batch_dir.stat().st_mtime) <= MAX_AGE_DAYS * 86400
              except OSError:
                  return False

          def post_is_published(post):
              return bool(post.get("published_at")) or post.get("status") == "published"

          for batch in sorted([p for p in root.iterdir() if p.is_dir()]):
              if not batch_is_recent(batch):
                  continue
              carousels = [p for p in batch.iterdir() if p.is_dir()]
              if not carousels:
                  continue
              manifest = batch / "publish_manifest.json"
              if not manifest.exists():
                  pending += len(carousels)
                  continue
              try:
                  data = json.loads(manifest.read_text(encoding="utf-8"))
              except Exception:
                  pending += len(carousels)
                  continue
              pending += sum(
                  1 for post in data.get("posts", [])
                  if not post_is_published(post) and post.get("status") not in terminal
              )

          print(pending)
          PY
          )

          if [ "$UNPUBLISHED" -gt 0 ]; then
            echo "has_batch=true" >> "$GITHUB_OUTPUT"
            echo "Found $UNPUBLISHED unpublished carousel(s). Deploy and publish will run."
          else
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
            echo "All carousels are already published or failed. Skipping deploy and publish."
          fi

      - name: Explain skipped publish
        if: steps.detect.outputs.has_batch != 'true'
        run: |
          echo "Deploy and publish are skipped - either no new email arrived this run,"
          echo "or all existing carousels are already published/failed."
          echo "This is normal and expected on most runs."

      - name: Upload GitHub Pages artifact
        if: steps.detect.outputs.has_batch == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  # ── 2. DEPLOY TO GITHUB PAGES ────────────────────────────────────────────────
  deploy-pages:
    name: Deploy reports to GitHub Pages
    needs: generate
    if: needs.generate.outputs.has_batch == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 3. PUBLISH TO INSTAGRAM ───────────────────────────────────────────────────
  publish:
    name: Publish to Instagram
    needs: deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AUTO_PUBLISH_INSTAGRAM: 'true'
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IG_API_VERSION: v24.0
      # GitHub Pages URL - slides are publicly reachable here before Instagram fetches them.
      PUBLIC_MEDIA_BASE_URL: ${{ needs.deploy-pages.outputs.page_url }}instagram_posts
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull generated commit (fetches slides committed by generate)
        run: git pull --ff-only

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Publish pending carousels to Instagram
        run: python scripts/publish_latest_instagram.py --all

      - name: Set git remote with token
        run: git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Commit publish manifest status
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          [ -d reports/instagram_posts ] && git add -f reports/instagram_posts/
          if git diff --cached --quiet; then
            echo "No publish status changes."
          else
            git commit -m 'Update Instagram publish status [skip ci]'
            git push
          fi
