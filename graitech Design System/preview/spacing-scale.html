<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 22px 24px; font-family: var(--gt-font-mono); }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .row .tok { font-size: 10px; color: var(--gt-neon); width: 100px; letter-spacing: 0.04em; }
  .row .px { font-size: 10px; color: var(--gt-smoke); width: 36px; }
  .row .bar { background: var(--gt-neon); height: 14px; box-shadow: 0 0 10px rgba(57,255,20,0.35); }
</style></head>
<body>
  <div class="row"><span class="tok">--gt-s-1</span><span class="px">4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="tok">--gt-s-2</span><span class="px">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="tok">--gt-s-3</span><span class="px">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="tok">--gt-s-4</span><span class="px">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="tok">--gt-s-5</span><span class="px">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="tok">--gt-s-6</span><span class="px">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="tok">--gt-s-7</span><span class="px">48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="tok">--gt-s-8</span><span class="px">64</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="tok">--gt-s-9</span><span class="px">96</span><span class="bar" style="width:96px"></span></div>
  <div class="row"><span class="tok">--gt-s-10</span><span class="px">128</span><span class="bar" style="width:128px"></span></div>
</body></html>
