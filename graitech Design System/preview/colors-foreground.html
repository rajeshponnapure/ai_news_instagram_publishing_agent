<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw {
    height: 110px; border-radius: var(--gt-r-sm);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 10px; gap: 2px;
    border: 1px solid var(--gt-border);
  }
  .sw .name { font-family: var(--gt-font-mono); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; }
  .sw .hex { font-family: var(--gt-font-mono); font-size: 10px; opacity: 0.7; }
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#FFFFFF;"><span class="name" style="color:#000">White / fg-1</span><span class="hex" style="color:#000">#FFFFFF</span></div>
    <div class="sw" style="background:#E8E8E8;"><span class="name" style="color:#000">Chalk / fg-2</span><span class="hex" style="color:#000">#E8E8E8</span></div>
    <div class="sw" style="background:#A8A8A8;"><span class="name" style="color:#000">Ash / fg-3</span><span class="hex" style="color:#000">#A8A8A8</span></div>
    <div class="sw" style="background:#6B6B6B;"><span class="name" style="color:#fff">Smoke / muted</span><span class="hex" style="color:#fff">#6B6B6B</span></div>
  </div>
</body></html>
