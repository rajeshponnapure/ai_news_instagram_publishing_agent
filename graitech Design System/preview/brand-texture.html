<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 18px 24px; display: flex; flex-direction: column; gap: 10px; }
  .name { font-family: var(--gt-font-mono); font-size: 10px; color: var(--gt-neon);
          text-transform: uppercase; letter-spacing: 0.18em; }
  .tex {
    height: 220px; border: 1px solid var(--gt-iron);
    background: url("../assets/concrete-texture.svg") center/cover #000;
    position: relative;
  }
  .tex::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 40%, transparent 100%);
  }
</style></head>
<body>
  <span class="name">Background — concrete texture + crosshatch overlay</span>
  <div class="tex"></div>
</body></html>
