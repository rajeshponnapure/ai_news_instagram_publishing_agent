<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 0; }
  .frame {
    position: relative;
    aspect-ratio: 4 / 5;
    width: 100%;
    background: url("../assets/concrete-texture.svg") center/cover #000;
    overflow: hidden;
  }
  .frame::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 30%, transparent 95%);
  }
  .logo { position: absolute; top: 18px; right: 18px; width: 50px; height: 50px; z-index: 5;
          filter: drop-shadow(0 0 10px rgba(57,255,20,0.4)); }
  .logo img { width: 100%; height: 100%; }
  .handle { position: absolute; bottom: 18px; left: 18px; z-index: 5;
            font-family: var(--gt-font-mono); font-size: 10px; font-weight: 700;
            color: #fff; letter-spacing: 0.06em; display: flex; align-items: center; gap: 6px; }
  .handle::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: #39FF14; box-shadow: 0 0 6px #39FF14; }
  .page { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 5;
          font-family: var(--gt-font-mono); font-size: 9px; letter-spacing: 0.32em;
          color: #A8A8A8; display: flex; align-items: center; gap: 8px; }
  .page .num { color: #39FF14; font-weight: 700; }
  .page .bar { width: 12px; height: 1px; background: #3A3A3A; }
  /* safe-area outlines */
  .zone {
    position: absolute; border: 1.5px dashed rgba(57,255,20,0.5);
    font-family: var(--gt-font-mono); font-size: 8px; font-weight: 700;
    color: #39FF14; letter-spacing: 0.18em; text-transform: uppercase;
    display: flex; align-items: flex-end; padding: 4px;
  }
  .zone.content { top: 70px; left: 26px; right: 26px; bottom: 50px; }
  .zone.logo-z { top: 18px; right: 18px; width: 50px; height: 50px; border-color: rgba(255,184,0,0.55); color: #FFB800; }
  .zone.handle-z { bottom: 18px; left: 18px; width: 92px; height: 22px; border-color: rgba(255,184,0,0.55); color: #FFB800; }
  .zone.page-z { bottom: 18px; left: 50%; transform: translateX(-50%); width: 60px; height: 20px; border-color: rgba(255,184,0,0.55); color: #FFB800; }
</style></head>
<body>
  <div class="frame">
    <div class="zone content">content safe-area</div>
    <div class="zone logo-z"></div>
    <div class="zone handle-z"></div>
    <div class="zone page-z"></div>
    <div class="logo"><img src="../assets/graitech-logo.png" alt=""></div>
    <div class="handle">@graitech</div>
    <div class="page"><span class="bar"></span><span class="num">01</span> / 05<span class="bar"></span></div>
  </div>
</body></html>
