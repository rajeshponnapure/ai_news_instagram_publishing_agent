<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 22px 24px; }
  .meta {
    font-family: var(--gt-font-mono); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.32em; color: var(--gt-neon);
    margin-bottom: 8px;
  }
  .specimen {
    font-family: var(--gt-font-display); /* Anton SC */
    font-size: 124px; line-height: 0.88;
    color: var(--gt-neon);
    letter-spacing: 0.02em;
    text-shadow: 0 0 20px rgba(57,255,20,0.32);
  }
  .caption {
    font-family: var(--gt-font-mono); font-size: 11px; color: var(--gt-ash);
    margin-top: 10px; letter-spacing: 0.04em;
  }
</style></head>
<body>
  <div class="meta">Tall Display · Anton SC · H2</div>
  <div class="specimen">BUILD AT THE EDGE</div>
  <div class="caption">Stacked, all-caps headlines. Use when you need maximum impact in narrow columns.</div>
</body></html>
