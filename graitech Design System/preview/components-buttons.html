<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 24px; font-family: var(--gt-font-mono); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .btn {
    border: 1.5px solid transparent;
    padding: 14px 22px;
    font-family: var(--gt-font-mono);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: var(--gt-r-sm);
    transition: all 180ms cubic-bezier(0.2,0.7,0.1,1);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .btn::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: currentColor; box-shadow: 0 0 10px currentColor;
  }
  /* primary — neon fill */
  .btn-primary {
    background: var(--gt-neon); color: #000; border-color: var(--gt-neon);
    box-shadow: 0 0 22px rgba(57,255,20,0.45);
  }
  .btn-primary::before { background: #000; box-shadow: none; }
  /* secondary — neon outline */
  .btn-secondary {
    background: transparent; color: var(--gt-neon); border-color: var(--gt-neon);
  }
  /* ghost — chalk outline */
  .btn-ghost {
    background: transparent; color: var(--gt-chalk); border-color: var(--gt-cement-2);
  }
  .btn-ghost::before { background: var(--gt-chalk); box-shadow: none; }
  /* disabled */
  .btn-dis {
    background: var(--gt-graphite); color: var(--gt-smoke); border-color: var(--gt-iron);
    cursor: not-allowed;
  }
  .btn-dis::before { background: var(--gt-smoke); box-shadow: none; }
</style></head>
<body>
  <button class="btn btn-primary">Launch</button>
  <button class="btn btn-secondary">Read more</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-dis">Disabled</button>
</body></html>
