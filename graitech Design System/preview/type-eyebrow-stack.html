<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 22px 24px; }
  .eyebrow {
    font-family: var(--gt-font-mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.32em; text-transform: uppercase; color: var(--gt-neon);
    margin-bottom: 16px;
  }
  .rule { width: 64px; height: 2px; background: var(--gt-neon); box-shadow: 0 0 12px rgba(57,255,20,0.5); margin-bottom: 18px; }
  .h { font-family: var(--gt-font-display); font-size: 42px; line-height: 0.95; color: var(--gt-white); text-transform: uppercase; letter-spacing: 0.02em; margin: 0 0 12px; }
  .p { font-family: var(--gt-font-mono); font-size: 13px; line-height: 1.55; color: var(--gt-chalk); margin: 0; }
</style></head>
<body>
  <div class="eyebrow">Field Notes · 026</div>
  <div class="rule"></div>
  <h2 class="h">The rhythm:<br>eyebrow → rule → headline → body.</h2>
  <p class="p">Used at the top of every IG slide and most marketing modules. The rule is always neon, always glowing.</p>
</body></html>
