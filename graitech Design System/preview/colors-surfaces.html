<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw {
    height: 110px; border-radius: var(--gt-r-sm);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 10px; gap: 2px;
    border: 1px solid #2A2A2A;
  }
  .sw .name { font-family: var(--gt-font-mono); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: #fff; }
  .sw .hex { font-family: var(--gt-font-mono); font-size: 9px; opacity: 0.7; color: #fff; }
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#000000;"><span class="name">Black</span><span class="hex">#000000</span></div>
    <div class="sw" style="background:#0A0A0A;"><span class="name">Ink</span><span class="hex">#0A0A0A</span></div>
    <div class="sw" style="background:#141414;"><span class="name">Graphite</span><span class="hex">#141414</span></div>
    <div class="sw" style="background:#1E1E1E;"><span class="name">Iron</span><span class="hex">#1E1E1E</span></div>
    <div class="sw" style="background:#2A2A2A;"><span class="name">Cement</span><span class="hex">#2A2A2A</span></div>
    <div class="sw" style="background:#3A3A3A;"><span class="name">Cement 2</span><span class="hex">#3A3A3A</span></div>
  </div>
</body></html>
