<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 22px 24px; display: flex; gap: 24px; align-items: center; }
  .frame {
    width: 150px; height: 150px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--gt-iron);
    background: #000;
  }
  .frame img { width: 80%; height: 80%; object-fit: contain; }
  .frame.light { background: #fff; }
  .frame.cement { background-image: url("../assets/concrete-tile.svg"); background-size: cover; }
  .frame.glow img { filter: drop-shadow(0 0 18px rgba(57,255,20,0.5)); }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .name {
    font-family: var(--gt-font-mono); font-size: 10px; color: var(--gt-neon);
    text-transform: uppercase; letter-spacing: 0.18em;
  }
</style></head>
<body>
  <div class="stack">
    <div class="frame glow"><img src="../assets/graitech-logo.png" alt=""></div>
    <span class="name">on black</span>
  </div>
  <div class="stack">
    <div class="frame cement"><img src="../assets/graitech-logo.png" alt=""></div>
    <span class="name">on concrete</span>
  </div>
  <div class="stack">
    <div class="frame light"><img src="../assets/graitech-logo.png" alt="" style="filter: invert(1);"></div>
    <span class="name">inverted</span>
  </div>
</body></html>
