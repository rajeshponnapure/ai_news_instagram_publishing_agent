<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .stamp {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    font-family: var(--gt-font-mono);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.24em; text-transform: uppercase;
    border-radius: 999px;
  }
  .stamp.neon { color: var(--gt-neon); border: 1.5px solid var(--gt-neon); }
  .stamp.neon::before { content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--gt-neon); box-shadow: 0 0 8px var(--gt-neon); }
  .stamp.solid { background: var(--gt-neon); color: #000; }
  .stamp.solid::before { content: ""; width: 7px; height: 7px; background: #000; border-radius: 50%; }
  .stamp.ghost { color: var(--gt-chalk); border: 1.5px solid var(--gt-cement-2); }
  .stamp.warn { color: var(--gt-warn); border: 1.5px solid var(--gt-warn); }
  .stamp.warn::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--gt-warn); box-shadow: 0 0 8px var(--gt-warn); }
  .stamp.danger { color: var(--gt-danger); border: 1.5px solid var(--gt-danger); }
  .stamp.danger::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--gt-danger); }
  .tag {
    font-family: var(--gt-font-mono); font-size: 10px; color: var(--gt-fg-2);
    padding: 4px 10px; background: var(--gt-graphite); border: 1px solid var(--gt-iron);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
</style></head>
<body>
  <span class="stamp solid">Dispatch / 026</span>
  <span class="stamp neon">Live</span>
  <span class="stamp ghost">Draft</span>
  <span class="stamp warn">Beta</span>
  <span class="stamp danger">Deprecated</span>
  <span class="tag">#engineering</span>
  <span class="tag">#field-notes</span>
</body></html>
