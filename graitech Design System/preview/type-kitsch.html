<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 22px 24px; }
  .meta {
    font-family: var(--gt-font-mono); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.32em; color: var(--gt-neon);
    margin-bottom: 14px;
  }
  .specimen {
    font-family: var(--gt-font-kitsch);
    font-size: 72px; line-height: 1;
    color: var(--gt-neon);
    text-shadow: 0 0 18px rgba(57,255,20,0.3);
  }
  .caption {
    font-family: var(--gt-font-mono); font-size: 11px; color: var(--gt-ash);
    margin-top: 14px; letter-spacing: 0.04em;
  }
</style></head>
<body>
  <div class="meta">Wildcard · Fontdiner Swanky</div>
  <div class="specimen">After hours.</div>
  <div class="caption">Retro accent. Use sparingly — section tags, easter-egg labels, never body copy.</div>
</body></html>
