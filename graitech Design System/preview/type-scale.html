<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 18px 24px; font-family: var(--gt-font-mono); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
       color: var(--gt-smoke); padding: 6px 8px; border-bottom: 1px solid var(--gt-iron); font-weight: 700; }
  td { padding: 8px; border-bottom: 1px solid var(--gt-iron); vertical-align: baseline; }
  .tok { font-size: 10px; color: var(--gt-neon); }
  .px  { font-size: 10px; color: var(--gt-ash); }
  .demo { color: var(--gt-white); line-height: 1; }
</style></head>
<body>
<table>
  <thead><tr><th>Token</th><th>Px</th><th style="width:60%">Specimen</th></tr></thead>
  <tbody>
    <tr><td class="tok">--gt-fs-5xl</td><td class="px">160</td><td class="demo" style="font-family:var(--gt-font-block);font-size:42px;color:var(--gt-neon)">Aa</td></tr>
    <tr><td class="tok">--gt-fs-3xl</td><td class="px">72</td><td class="demo" style="font-family:var(--gt-font-display);font-size:32px">Aa</td></tr>
    <tr><td class="tok">--gt-fs-2xl</td><td class="px">48</td><td class="demo" style="font-family:var(--gt-font-display);font-size:24px">Aa</td></tr>
    <tr><td class="tok">--gt-fs-lg</td><td class="px">24</td><td class="demo" style="font-size:16px">Aa</td></tr>
    <tr><td class="tok">--gt-fs-base</td><td class="px">15</td><td class="demo" style="font-size:13px">Aa</td></tr>
    <tr><td class="tok">--gt-fs-xs</td><td class="px">11</td><td class="demo" style="font-size:10px">Aa</td></tr>
  </tbody>
</table>
</body></html>
