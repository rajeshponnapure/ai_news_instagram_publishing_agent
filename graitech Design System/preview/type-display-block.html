<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 22px 24px; }
  .meta {
    font-family: var(--gt-font-mono); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.32em; color: var(--gt-neon);
    margin-bottom: 12px;
  }
  .specimen {
    font-family: var(--gt-font-block);
    font-size: 92px; line-height: 0.92;
    color: var(--gt-neon);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    text-shadow: 0 0 22px rgba(57,255,20,0.35);
  }
  .caption {
    font-family: var(--gt-font-mono); font-size: 11px; color: var(--gt-ash);
    margin-top: 12px; letter-spacing: 0.04em;
  }
</style></head>
<body>
  <div class="meta">Block Display · Bungee · H1</div>
  <div class="specimen">graitech.</div>
  <div class="caption">Used for hero numbers, slide headlines, IG title slides. Always uppercase.</div>
</body></html>
