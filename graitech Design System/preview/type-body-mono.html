<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 22px 24px; font-family: var(--gt-font-mono); }
  .meta {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.32em; color: var(--gt-neon);
    margin-bottom: 12px;
  }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .row .lab { font-size: 9px; color: var(--gt-smoke); width: 64px; letter-spacing: 0.12em; text-transform: uppercase; }
  .s24 { font-size: 22px; line-height: 1.3; }
  .s16 { font-size: 16px; line-height: 1.5; }
  .s14 { font-size: 13px; line-height: 1.5; color: var(--gt-chalk); }
  .s11 { font-size: 11px; line-height: 1.4; color: var(--gt-ash); letter-spacing: 0.04em; }
  .italic { font-style: italic; }
</style></head>
<body>
  <div class="meta">Body · Space Mono · Paragraph</div>
  <div class="row"><span class="lab">22 / 700</span><span class="s24" style="font-weight:700">Engineered for the edge.</span></div>
  <div class="row"><span class="lab">16 / 400</span><span class="s16">Ship the seam first; the rest is bookkeeping.</span></div>
  <div class="row"><span class="lab">13 / 400</span><span class="s14">Observability beats heroics. Logs before features, always.</span></div>
  <div class="row"><span class="lab">11 / italic</span><span class="s11 italic">// inline comment / metadata / timestamps</span></div>
</body></html>
