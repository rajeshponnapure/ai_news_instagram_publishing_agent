<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); color: var(--gt-white); }
  body { padding: 22px 24px; font-family: var(--gt-font-mono); display: flex; flex-direction: column; gap: 12px; }
  .swipe {
    display: inline-flex; align-items: center; gap: 14px;
    font-size: 13px; font-weight: 700;
    color: var(--gt-neon); letter-spacing: 0.24em; text-transform: uppercase;
  }
  .swipe .arrow {
    width: 48px; height: 2px; background: var(--gt-neon); position: relative;
    box-shadow: 0 0 8px rgba(57,255,20,0.5);
  }
  .swipe .arrow::after {
    content: ""; position: absolute; right: -1px; top: 50%;
    width: 10px; height: 10px;
    border-top: 2px solid var(--gt-neon); border-right: 2px solid var(--gt-neon);
    transform: translateY(-50%) rotate(45deg);
  }
  .rule { width: 80px; height: 3px; background: var(--gt-neon); box-shadow: 0 0 12px rgba(57,255,20,0.5); }
  .dot-row { display: flex; gap: 6px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gt-cement-2); }
  .dot.on { background: var(--gt-neon); box-shadow: 0 0 8px var(--gt-neon); }
  .ticks {
    position: relative; width: 120px; height: 40px;
    border: 1.5px solid var(--gt-cement-2);
  }
  .ticks::before, .ticks::after,
  .ticks > i::before, .ticks > i::after {
    content: ""; position: absolute; width: 8px; height: 8px;
    border-color: var(--gt-neon);
  }
  .ticks::before { top: -1.5px; left: -1.5px; border-top: 1.5px solid; border-left: 1.5px solid; }
  .ticks::after  { top: -1.5px; right: -1.5px; border-top: 1.5px solid; border-right: 1.5px solid; }
  .ticks > i::before { bottom: -1.5px; left: -1.5px; border-bottom: 1.5px solid; border-left: 1.5px solid; top: auto; }
  .ticks > i::after  { bottom: -1.5px; right: -1.5px; border-bottom: 1.5px solid; border-right: 1.5px solid; top: auto; }
  .row { display: flex; gap: 28px; align-items: center; }
  .lab { font-size: 9px; color: var(--gt-smoke); letter-spacing: 0.18em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div class="swipe">Swipe <span class="arrow"></span></div>
      <span class="lab">swipe CTA</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div class="rule"></div>
      <span class="lab">accent rule</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div class="dot-row"><span class="dot on"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <span class="lab">pagination</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div class="ticks"><i></i></div>
      <span class="lab">corner ticks</span>
    </div>
  </div>
</body></html>
