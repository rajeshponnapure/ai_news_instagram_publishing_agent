<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--gt-bg); }
  body { padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw {
    height: 110px; border-radius: var(--gt-r-sm);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 10px; gap: 2px;
    border: 1px solid var(--gt-border);
    position: relative; overflow: hidden;
  }
  .sw .name {
    font-family: var(--gt-font-mono); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .sw .hex {
    font-family: var(--gt-font-mono); font-size: 10px;
    opacity: 0.75;
  }
  .sw.dark .name, .sw.dark .hex { color: var(--gt-white); }
  .sw.light .name, .sw.light .hex { color: var(--gt-black); }
  .glow { box-shadow: 0 0 18px rgba(57,255,20,0.4); }
</style></head>
<body>
  <div class="grid">
    <div class="sw dark glow" style="background:#39FF14;">
      <span class="name" style="color:#000">Neon</span>
      <span class="hex" style="color:#000">#39FF14</span>
    </div>
    <div class="sw dark" style="background:#5AFF3A;">
      <span class="name" style="color:#000">Neon Soft</span>
      <span class="hex" style="color:#000">#5AFF3A</span>
    </div>
    <div class="sw dark" style="background:#1FCC00;">
      <span class="name" style="color:#000">Neon Deep</span>
      <span class="hex" style="color:#000">#1FCC00</span>
    </div>
    <div class="sw dark" style="background:#000; border-color:#39FF14;">
      <span class="name" style="color:#39FF14">Glow</span>
      <span class="hex" style="color:#39FF14">rgba 45%</span>
    </div>
  </div>
</body></html>
